<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
      color: #f1f5f9;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      color: #e2e8f0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      min-height: 1.8rem;
      color: #94a3b8;
    }

    #status.winner { color: #4ade80; font-weight: 600; }
    #status.draw   { color: #fbbf24; font-weight: 600; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #273549;
      transform: scale(1.04);
    }

    .cell.x { color: #60a5fa; }
    .cell.o { color: #f472b6; }
    .cell.win-cell { background: #1e3a2f; border-color: #4ade80; }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1rem;
      color: #94a3b8;
    }

    .score-item span {
      font-size: 1.4rem;
      font-weight: 700;
      display: block;
      text-align: center;
    }

    .score-item .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    #score-x span  { color: #60a5fa; }
    #score-o span  { color: #f472b6; }
    #score-d span  { color: #fbbf24; }

    #btn-restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #btn-restart:hover { background: #2563eb; }

    #mode-toggle {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      padding: 0.4rem 1.2rem;
      border: 2px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    .mode-btn.active {
      border-color: #3b82f6;
      color: #60a5fa;
      background: #172033;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="mode-toggle">
    <button class="mode-btn active" id="btn-2p" onclick="setMode('2p')">2 Players</button>
    <button class="mode-btn" id="btn-ai" onclick="setMode('ai')">vs Computer</button>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0" onclick="play(0)"></div>
    <div class="cell" data-i="1" onclick="play(1)"></div>
    <div class="cell" data-i="2" onclick="play(2)"></div>
    <div class="cell" data-i="3" onclick="play(3)"></div>
    <div class="cell" data-i="4" onclick="play(4)"></div>
    <div class="cell" data-i="5" onclick="play(5)"></div>
    <div class="cell" data-i="6" onclick="play(6)"></div>
    <div class="cell" data-i="7" onclick="play(7)"></div>
    <div class="cell" data-i="8" onclick="play(8)"></div>
  </div>

  <div id="scoreboard">
    <div class="score-item" id="score-x">
      <span id="sx">0</span>
      <div class="label">X Wins</div>
    </div>
    <div class="score-item" id="score-d">
      <span id="sd">0</span>
      <div class="label">Draws</div>
    </div>
    <div class="score-item" id="score-o">
      <span id="so">0</span>
      <div class="label">O Wins</div>
    </div>
  </div>

  <button id="btn-restart" onclick="restart()">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, mode, scores;

    function init() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;
      if (!scores) scores = { X: 0, O: 0, D: 0 };
      if (!mode)   mode   = '2p';
      render();
      setStatus(`Player X's turn`);
    }

    function setMode(m) {
      mode = m;
      document.getElementById('btn-2p').classList.toggle('active', m === '2p');
      document.getElementById('btn-ai').classList.toggle('active', m === 'ai');
      restart();
    }

    function play(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      render();
      const result = checkWin();
      if (result) return finish(result);
      current = current === 'X' ? 'O' : 'X';
      setStatus(`Player ${current}'s turn`);
      if (mode === 'ai' && current === 'O' && !gameOver) {
        setTimeout(aiMove, 300);
      }
    }

    function aiMove() {
      const best = minimax(board, 'O');
      play(best.index);
    }

    function minimax(b, player) {
      const empty = b.map((v,i) => v ? null : i).filter(v => v !== null);
      const win = checkWinState(b);
      if (win === 'X') return { score: -10 };
      if (win === 'O') return { score:  10 };
      if (!empty.length) return { score: 0 };

      const moves = empty.map(i => {
        const nb = [...b];
        nb[i] = player;
        const result = minimax(nb, player === 'O' ? 'X' : 'O');
        return { index: i, score: result.score };
      });

      return player === 'O'
        ? moves.reduce((a, b) => b.score > a.score ? b : a)
        : moves.reduce((a, b) => b.score < a.score ? b : a);
    }

    function checkWinState(b) {
      for (const [a,c,d] of WINS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      return b.every(Boolean) ? 'D' : null;
    }

    function checkWin() {
      return checkWinState(board);
    }

    function finish(result) {
      gameOver = true;
      const status = document.getElementById('status');
      if (result === 'D') {
        scores.D++;
        status.textContent = "It's a draw!";
        status.className = 'draw';
      } else {
        scores[result]++;
        status.textContent = `Player ${result} wins! 🎉`;
        status.className = 'winner';
        highlightWin(result);
      }
      document.getElementById('sx').textContent = scores.X;
      document.getElementById('so').textContent = scores.O;
      document.getElementById('sd').textContent = scores.D;
    }

    function highlightWin(winner) {
      for (const combo of WINS) {
        const [a,b,c] = combo;
        if (board[a] === winner && board[b] === winner && board[c] === winner) {
          combo.forEach(i => cells()[i].classList.add('win-cell'));
          break;
        }
      }
    }

    function setStatus(msg) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.className = '';
    }

    function cells() {
      return document.querySelectorAll('.cell');
    }

    function render() {
      cells().forEach((cell, i) => {
        cell.textContent = board[i] || '';
        cell.className = 'cell' + (board[i] ? ` ${board[i].toLowerCase()} taken` : '');
      });
    }

    function restart() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;
      render();
      setStatus(`Player X's turn`);
    }

    init();
  </script>
</body>
</html>
